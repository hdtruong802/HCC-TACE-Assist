# 3D-IRCADb-01 external test config — Liver Cancer AI
# GOLDEN external set (chạm 1 lần, KHÔNG tinh chỉnh threshold ở đây).
# preprocess + label_transfer PHẢI trùng khớp configs/data/lits.yaml để so sánh công bằng.
dataset:
  name: 3dircadb1
  version: v1
  data_root: /kaggle/input      # tự dò thư mục chứa PATIENT_DICOM (đệ quy)

preprocess:                     # ==== GIỮ GIỐNG lits.yaml ====
  window: { wl: 50, ww: 350 }
  size: 256
  liver_crop: true
  crop_margin: 16

label_transfer:                 # ==== GIỮ GIỐNG lits.yaml ====
  tau_area: 20
  tau_liver: 50
  liver_label: 1
  tumor_label: 2

paths:
  manifest: manifest_ircad.csv
  image_file: images_u8_ircad.npy
